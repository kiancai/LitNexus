# 产品主线为原生桌面；无 Python 入库后，CI 只校验文档可构建。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs
        run: pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict

  windows-foundation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows Core, WPF shell, and contract selftest
        shell: pwsh
        run: .\win\build.ps1 -Configuration Release -SelfTest
