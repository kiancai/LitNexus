name: Release

# 只有发布 tag 才构建。两个平台各自产出资产；唯一的 publish job 在两个构建都
# 成功后创建 / 更新 GitHub Release，避免并行 job 互相争用同一个 release。
on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Build native .app (SPM, release)
        working-directory: mac
        run: ./make_app.sh release

      - name: Engine selftest (gate)
        working-directory: mac
        run: ./LitNexus.app/Contents/MacOS/LitNexus selftest

      - name: Verify Apple Silicon artifact
        working-directory: mac
        run: |
          binary='LitNexus.app/Contents/MacOS/LitNexus'
          file "$binary"
          lipo -archs "$binary" | grep -qw arm64

      - name: Package macOS asset
        working-directory: mac
        run: |
          mkdir -p release-assets
          printf '%s\n' \
            'LitNexus for macOS（Apple Silicon / arm64）' \
            '' \
            '本应用未经 Apple 公证签名（个人项目，无开发者账号），首次打开需手动放行：' \
            '  方式一：右键点击 LitNexus.app →「打开」→ 在弹窗里再次点「打开」。' \
            '  方式二：终端执行  xattr -dr com.apple.quarantine /拖入/LitNexus.app' \
            '' \
            '升级：下载新版本 zip，解压后用新的 LitNexus.app 覆盖旧的即可。' \
            '你的数据存放在自己选择的「工作区」目录，与 App 分离，升级不会丢失。' \
            > 'release-assets/INSTALL-macOS.txt'
          ditto -c -k --keepParent LitNexus.app release-assets/LitNexus-macos-arm64.zip

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: mac/release-assets/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET SDK for the Windows build
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows app and run contract selftest
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag.StartsWith('v') -or $tag.Length -le 1) {
            throw "Expected a v-prefixed release tag, got '$tag'."
          }

          # Keep the portable prerelease identity (for example 0.2.0-beta6)
          # in the Windows binary while build.ps1 derives numeric FileVersion.
          $version = $tag.Substring(1)
          .\win\build.ps1 -Configuration Release -SelfTest -Version $version

      - name: Package complete Windows runtime directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $assetName = 'LitNexus-windows-net48-preview'
          $runtimeDirectory = Join-Path $PWD 'win\src\LitNexus.Desktop\bin\Release\net48'
          $executable = Join-Path $runtimeDirectory 'LitNexus.exe'
          if (-not (Test-Path $executable)) {
            throw "Expected Windows executable was not built: $executable"
          }

          $releaseAssets = Join-Path $PWD 'release-assets'
          $packageRoot = Join-Path $env:RUNNER_TEMP $assetName
          Remove-Item -Recurse -Force $releaseAssets, $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $releaseAssets, $packageRoot | Out-Null

          # 运行时所需的所有 DLL、原生 SQLite 库和 .config 都必须一起保留；不可只发布 exe。
          Copy-Item -Recurse -Force (Join-Path $runtimeDirectory '*') $packageRoot
          Copy-Item -Force 'win\INSTALL-Windows.txt' (Join-Path $packageRoot 'INSTALL-Windows.txt')

          $zipPath = Join-Path $releaseAssets "$assetName.zip"
          Compress-Archive -Path $packageRoot -DestinationPath $zipPath -CompressionLevel Optimal

          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $assetName.zip" | Set-Content -LiteralPath "$zipPath.sha256" -Encoding ascii
          Copy-Item -Force 'win\INSTALL-Windows.txt' $releaseAssets

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/
          if-no-files-found: error

  publish:
    needs:
      - build-mac
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets from both platform builds
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          body: |
            ## Windows Preview

            `LitNexus-windows-net48-preview.zip` 是完整解压后即可运行的便携测试包；请不要单独移动其中的 `LitNexus.exe`。

            本轮 Windows Preview 可测试项目选择、基础配置、数据状态、CSV 导出与人工复筛导回。运行、统计、完整配置和数据库维护仍在逐页对标，暂不应作为唯一生产环境。

            同一个工作区可在 macOS 和 Windows 间迁移，但两端不能同时写入同一个 SQLite/WAL 工作区。
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
