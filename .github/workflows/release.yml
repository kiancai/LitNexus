name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: litnexus-linux-x86_64
          - os: macos-13
            artifact: litnexus-macos-x86_64
            app: LitNexus-macos-x86_64
          - os: macos-latest
            artifact: litnexus-macos-arm64
            app: LitNexus-macos-arm64
          - os: windows-latest
            artifact: litnexus-windows-x86_64
            app: LitNexus-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra desktop

      # 统一用 --onedir：onefile 每次启动都要解压并触发系统安全扫描
      # （实测每条命令 15-20 秒），onedir 仅首跑扫描一次、之后亚秒级启动。

      # 控制台版：终端用户的 CLI 入口（无参数运行时也会以浏览器模式打开 GUI）
      - name: Build CLI binary (console)
        shell: bash
        run: |
          uv run pyinstaller \
            --onedir \
            --name ${{ matrix.artifact }} \
            --collect-all litnexus \
            --collect-all nicegui \
            --hidden-import pydantic_core \
            src/litnexus/cli/app.py
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}/"
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          fi
          rm -rf "${{ matrix.artifact }}"

      # 窗口版：双击即用的桌面应用（pywebview 原生窗口，无终端窗口）。
      # macOS 产出 .app，Windows 产出含 exe 的文件夹（zip 分发）。
      - name: Build GUI app (windowed)
        if: matrix.app != ''
        shell: bash
        run: |
          uv run pyinstaller \
            --onedir \
            --windowed \
            --name ${{ matrix.app }} \
            --collect-all litnexus \
            --collect-all nicegui \
            --collect-all webview \
            --hidden-import pydantic_core \
            src/litnexus/cli/app.py
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --keepParent "${{ matrix.app }}.app" "${{ matrix.app }}.app.zip"
            rm -rf "${{ matrix.app }}.app" "${{ matrix.app }}"
          else
            7z a "${{ matrix.app }}.zip" "${{ matrix.app }}/"
            rm -rf "${{ matrix.app }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
