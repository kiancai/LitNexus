name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            app: LitNexus-linux-x86_64
          # macOS Intel（macos-13）已弃用：GitHub 正逐步下线 Intel runner（排队极慢），
          # 且 Apple 已全面转向 Apple Silicon。只构建 arm64 版。
          - os: macos-latest
            app: LitNexus-macos-arm64
          - os: windows-latest
            app: LitNexus-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      # Linux 的原生窗口（pywebview）依赖系统 WebKitGTK，构建机需先装好。
      - name: Install Linux GUI runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libgtk-3-0

      - name: Install dependencies
        run: uv sync --extra dev --extra desktop

      # 只打 GUI 窗口版：双击即用的桌面应用（pywebview 原生窗口，无终端窗口）。
      # 不再打 CLI 控制台版（命令行用户用 `uv tool install` 即可）。
      # 统一用 --onedir：onefile 每次启动都要解压并触发系统安全扫描，onedir 仅首跑扫描一次。
      - name: Build GUI app (windowed)
        shell: bash
        run: |
          uv run pyinstaller \
            --onedir \
            --windowed \
            --name ${{ matrix.app }} \
            --collect-all litnexus \
            --collect-all nicegui \
            --collect-all webview \
            --hidden-import pydantic_core \
            src/litnexus/cli/app.py
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --keepParent "${{ matrix.app }}.app" "${{ matrix.app }}.app.zip"
            rm -rf "${{ matrix.app }}.app" "${{ matrix.app }}"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            7z a "${{ matrix.app }}.zip" "${{ matrix.app }}/"
            rm -rf "${{ matrix.app }}"
          else
            tar -czf "${{ matrix.app }}.tar.gz" "${{ matrix.app }}"
            rm -rf "${{ matrix.app }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}
          path: dist/*

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
