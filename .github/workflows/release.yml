name: Release

# 原生 Mac 版发布：打 tag（v*）即在 macOS runner 上用 SPM 构建 .app、跑引擎自检、
# 打包 zip 并创建 GitHub Release。Windows 原生版暂缓，待 Mac 定型后再加 job。
on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Build native .app (SPM, release)
        working-directory: mac
        run: ./make_app.sh release

      - name: Engine selftest (gate)
        working-directory: mac
        run: ./LitNexus.app/Contents/MacOS/LitNexus selftest

      - name: Package zip + install note
        working-directory: mac
        run: |
          printf '%s\n' \
            'LitNexus for macOS（Apple Silicon / arm64）' \
            '' \
            '本应用未经 Apple 公证签名（个人项目，无开发者账号），首次打开需手动放行：' \
            '  方式一：右键点击 LitNexus.app →「打开」→ 在弹窗里再次点「打开」。' \
            '  方式二：终端执行  xattr -dr com.apple.quarantine /拖入/LitNexus.app' \
            '' \
            '升级：下载新版本 zip，解压后用新的 LitNexus.app 覆盖旧的即可。' \
            '你的数据存放在自己选择的「工作区」目录，与 App 分离，升级不会丢失。' \
            > 'macOS-安装说明.txt'
          ditto -c -k --keepParent LitNexus.app LitNexus-macos-arm64.zip

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mac/LitNexus-macos-arm64.zip
            mac/macOS-安装说明.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
