# LitNexus 配置文件示例
#
# 配置随「工作区」走：每个工作区根目录下有一个 litnexus.toml。
# 通常无需手动复制本文件——运行 `litnexus init <目录>` 会在工作区里生成
# 一份等价的 litnexus.toml，也可用 `litnexus gui` 图形编辑。
# 本文件仅作字段参考。

[download]
days = 30           # 抓取最近 N 天内首次发表的文章
page_size = 1000    # 每页 API 返回数量（建议保持 1000）
request_delay = 0.5 # 每页请求之间的间隔秒数，避免被限速

[ai]
# 无内置默认值：请填你自己的 OpenAI 兼容服务商接口与模型。
# API key 优先级：环境变量 LITNEXUS_API_KEY > ARK_API_KEY > 此处 api_key
# Base URL 优先级：环境变量 LITNEXUS_BASE_URL > ARK_API_BASE_URL > 此处 base_url
# 留空 api_key 则依赖环境变量（推荐，避免密钥写入文件）
api_key = ""
base_url = ""
model = ""

[translate]
batch_size = 30   # 每次 API 调用翻译多少个标题
concurrency = 20  # 并发请求数

[classify]
max_workers = 100 # AI 分类的并发线程数

# 分类问题数组：每项的 id 作为数据库列前缀（{id}_ans / {id}_rea），text 是发给 AI 的 prompt。
# 可自由增删问题，无需改代码。
[[classify.questions]]
id = "q1"
text = "请判断本文是否属于'计算生物学、生物信息学、生物医学'或相关交叉领域。若文章属于以下任一类型，请回答'是'：(1) 涉及组学数据（基因/蛋白/代谢等）的分析或实验研究；(2) 涉及生物算法、模型、软件工具或数据库的开发与应用；(3) 对上述相关领域的综述、系统评价、进展总结或观点展望。仅当文章是纯粹的临床护理个案、社会学调查、或完全不涉及生物医学背景的纯数学/计算机理论时，才回答'否'。"

[[classify.questions]]
id = "q2"
text = "请判断本文是否属于以下任一核心关注领域（命中任意一项即回答'是'）：(a) 微生物组学（Microbiome）；(b) 生物基础模型与生成式AI；(c) 生物医学机器学习应用；(d) 病毒与病原体计算；(e) 生物信息核心工具。若均不属于，回答'否'。"

[schema]
# 人工复筛时填写的自定义注释列（均为 TEXT 类型，连接数据库时自动建列）。
# include 用于导出筛选与统计（取值 yes/no），可再加 tags、priority、notes 等。
custom_columns = ["include", "tags"]

[export]
# 导出范围：pending=未复筛(include 为空) | all=全部 | 自定义 SQL WHERE 子句
filter = "pending"
# 导出 CSV 时排除的列（通常排除大段 JSON / 不需要人工看的列）
exclude_columns = [
    "journal_info_json",
    "keyword_list_json",
    "abstract_zh",
]
